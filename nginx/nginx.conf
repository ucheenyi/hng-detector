# nginx/nginx.conf
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # --- JSON log format ---
    # $realip_remote_addr gives the real client IP even for direct connections
    # Do NOT use $http_x_forwarded_for — it is empty for direct connections
    log_format json_combined escape=json '{'
        '"source_ip":"$realip_remote_addr",'
        '"timestamp":"$time_iso8601",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"response_size":$body_bytes_sent,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent"'
    '}';

    access_log /var/log/nginx/hng-access.log json_combined;

    # Trust X-Forwarded-For — $realip_remote_addr uses this to resolve real client IP
    set_real_ip_from  0.0.0.0/0;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    sendfile on;
    keepalive_timeout 65;

    # ── Nextcloud — catches all traffic by default ──
    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass         http://nextcloud:80;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            client_max_body_size 10G;
            proxy_request_buffering off;
        }
    }

    # ── Dashboard — only matches your subdomain ──
    # Uses 172.17.0.1 (Docker host gateway) because localhost inside the
    # container refers to the container itself, not the VM host
    server {
        listen 80;
        server_name ucheenyi.mooo.com;

        location / {
            proxy_pass         http://172.17.0.1:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }
}
