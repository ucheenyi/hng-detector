# nginx/nginx.conf

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # --- JSON log format ---
    # This is required by the task. Every request is logged as a JSON line.
    log_format json_combined escape=json '{'
        '"source_ip":"$http_x_forwarded_for",'
        '"timestamp":"$time_iso8601",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"response_size":$body_bytes_sent,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent"'
    '}';

    # Write logs to the shared volume path
    access_log /var/log/nginx/hng-access.log json_combined;

    # Trust X-Forwarded-For from any upstream (Docker network)
    set_real_ip_from  0.0.0.0/0;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name _;   # Accept any hostname

        # Forward all traffic to Nextcloud container
        location / {
            proxy_pass         http://nextcloud:80;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Required for Nextcloud large file uploads
            client_max_body_size 10G;
            proxy_request_buffering off;
        }
    }
}
